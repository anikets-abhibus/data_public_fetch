name: CleverTap Hourly Export

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  export:
    runs-on: ubuntu-latest
    
    # Set maximum execution time to 360 minutes (6 hours)
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Export Script
        env:
          CT_ACCOUNT_ID: ${{ secrets.CT_ACCOUNT_ID }}
          CT_PASSCODE: ${{ secrets.CT_PASSCODE }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: |
          python ct_hourly_platform_export.py
