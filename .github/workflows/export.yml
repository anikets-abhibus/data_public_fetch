name: CleverTap Hourly Export

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: clevertap-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Previous Artifact (if exists)
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: export.yml
          name: ct_hourly_data_encrypted_previous_6months
          path: /tmp/
          workflow_conclusion: ""
          search_artifacts: true
          if_no_artifact_found: ignore

      - name: Run Export Script
        env:
          CT_ACCOUNT_ID: ${{ secrets.CT_ACCOUNT_ID }}
          CT_PASSCODE: ${{ secrets.CT_PASSCODE }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          python ct_hourly_platform_export.py

      - name: Upload Encrypted Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ct_hourly_data_encrypted_previous_6months
          path: /tmp/ct_hourly_platform_previous_6months.zip
          retention-days: 90
