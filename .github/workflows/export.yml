name: CleverTap Hourly Export

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google Drive Credentials File
        run: |
          cat << 'EOF' > gdrive_creds.json
          ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          EOF

      - name: Run Export Script
        env:
          CT_ACCOUNT_ID: ${{ secrets.CT_ACCOUNT_ID }}
          CT_PASSCODE: ${{ secrets.CT_PASSCODE }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python ct_hourly_platform_export.py
